name: CI
on: [push, pull_request]
jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify branch includes PR base
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          if ! git merge-base --is-ancestor "$BASE_REF" HEAD; then
            echo "This branch is not up to date with $BASE_REF. Rebase or merge the latest base branch before running CI." >&2
            exit 1
          fi
      - name: Check for unresolved merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- ':!extension/dist'; then
            echo "Unresolved merge conflict markers found." >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: extension
      - name: Typecheck extension
        run: npm run typecheck
        working-directory: extension
      - name: Test extension
        run: npm test
        working-directory: extension
      - name: Build extension
        run: npm run build
        working-directory: extension
      - name: Verify extension artifact exists
        run: |
          test -f extension/dist/manifest.json
          test -f extension/dist/src/background/service-worker.js
          test -f extension/dist/sidepanel.html
          test -f extension/dist/options.html
          find extension/dist -maxdepth 3 -type f | sort
      - uses: actions/upload-artifact@v4
        with:
          name: bookmark-queue-agent-extension
          path: extension/dist
          if-no-files-found: error
      - name: Write CI summary
        run: node scripts/ci-summary.mjs
        working-directory: extension
