name: CI
on: [push, pull_request]
jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify extension artifact contents
        run: npm run verify:dist
      - name: Upload loadable extension artifact
        id: upload-extension
        uses: actions/upload-artifact@v4
        with:
          name: bookmark-queue-agent-extension-load-unpacked
          path: ${{ github.workspace }}/extension/dist/**
          if-no-files-found: error
      - name: Write CI summary
        if: always()
        run: node scripts/ci-summary.mjs
        env:
          EXTENSION_ARTIFACT_ID: ${{ steps.upload-extension.outputs.artifact-id }}
          EXTENSION_ARTIFACT_URL: ${{ steps.upload-extension.outputs.artifact-url }}
      - name: Surface extension artifact links
        if: always() && steps.upload-extension.outputs.artifact-url != ''
        run: |
          echo "::notice title=Loadable extension artifact::bookmark-queue-agent-extension-load-unpacked → $EXTENSION_ARTIFACT_URL"
        env:
          EXTENSION_ARTIFACT_URL: ${{ steps.upload-extension.outputs.artifact-url }}
